# Configuration file for the WazAI Sentinel AI pipeline.
log_level: INFO
action_threshold: medium
order:
  - investigator
  - triage
  - enricher
  - correlator
  - responder
agents:
  investigator:
    provider: openai
    model: gpt-4o
    prompt: |
      You are WazAI Sentinel's Investigator. Evaluate the alert data below and return JSON with
      keys summary, findings, risk. Use concise bullet lists. Data: {data}
  triage:
    provider: grok
    model: grok-beta
    prompt: |
      Determine severity (high/medium/low) and justification as JSON with keys severity and
      justification. Data: {data}
  enricher:
    provider: openai
    model: gpt-4o
    prompt: |
      Provide contextual threat intelligence, recommended response steps, and references. Return
      JSON with keys intel, actions, references. Data: {data}
  correlator:
    provider: openai
    model: gpt-4o
    prompt: |
      Correlate the alert with historical events, highlighting related incident IDs or tactics.
      Return JSON keys correlations and notes. Data: {data}
  responder:
    provider: openai
    model: gpt-4o
    prompt: |
      Provide an incident response action plan that aligns with organisational playbooks.
      Return JSON with keys actions (list of objects with type, reason, and any parameters)
      and policy (string describing safeguards). Data: {data}
actions:
  notify:
    channel: security_ops
  create_ticket:
    system: jira
  isolate_endpoint:
    enabled: false
